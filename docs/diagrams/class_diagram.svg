<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="700">
  <style>.cls{font:12px sans-serif;} .title{font-weight:bold;font-size:13px;} .rect{fill:#fff;stroke:#333}</style>

  <!-- FeatureExtractor class -->
  <rect x="40" y="40" width="260" height="120" class="rect"/>
  <text x="50" y="62" class="title">FeatureExtractor</text>
  <text x="50" y="86" class="cls">- parse_url(url)</text>
  <text x="50" y="102" class="cls">- extract_features(url)</text>
  <text x="50" y="118" class="cls">- detect_homograph(domain)</text>

  <!-- Predictor class -->
  <rect x="360" y="40" width="260" height="130" class="rect"/>
  <text x="370" y="62" class="title">Predictor</text>
  <text x="370" y="86" class="cls">- load_models()</text>
  <text x="370" y="102" class="cls">- predict(features)</text>
  <text x="370" y="118" class="cls">- ensemble_score(rf,xgb)</text>
  <text x="370" y="134" class="cls">- apply_heuristics(features)</text>

  <!-- Explainer class -->
  <rect x="680" y="40" width="260" height="120" class="rect"/>
  <text x="690" y="62" class="title">ExplainerService</text>
  <text x="690" y="86" class="cls">- build_explanation(signals)</text>
  <text x="690" y="102" class="cls">- format_for_ui(payload)</text>
  <text x="690" y="118" class="cls">- suggest_education(attack_types)</text>

  <!-- Relationships -->
  <line x1="300" y1="100" x2="360" y2="100" stroke="#333" marker-end="url(#arrow)"/>
  <line x1="620" y1="100" x2="680" y2="100" stroke="#333" marker-end="url(#arrow)"/>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#333"/>
    </marker>
  </defs>

  <!-- ScanResult & Database classes -->
  <rect x="360" y="220" width="260" height="90" class="rect"/>
  <text x="370" y="242" class="title">ScanService</text>
  <text x="370" y="266" class="cls">- orchestrate_scan(input)</text>
  <text x="370" y="282" class="cls">- save_result(db)</text>

  <rect x="680" y="220" width="260" height="90" class="rect"/>
  <text x="690" y="242" class="title">Database (Postgres)</text>
  <text x="690" y="266" class="cls">- save_scan(record)</text>
  <text x="690" y="282" class="cls">- fetch_history(user_id)</text>

  <line x1="490" y1="260" x2="680" y2="260" stroke="#333" marker-end="url(#arrow)"/>

  <!-- Frontend classes -->
  <rect x="40" y="220" width="260" height="120" class="rect"/>
  <text x="50" y="242" class="title">Frontend UI</text>
  <text x="50" y="266" class="cls">- ScanInput.jsx</text>
  <text x="50" y="282" class="cls">- ScanResult.jsx</text>
  <text x="50" y="298" class="cls">- Dashboard.jsx</text>

  <line x1="300" y1="280" x2="360" y2="280" stroke="#333" marker-end="url(#arrow)"/>

  <text x="40" y="360" font-size="12">Classes simplified for report: FeatureExtractor &rarr; Predictor &rarr; ExplainerService &rarr; ScanService &rarr; Database</text>
</svg>