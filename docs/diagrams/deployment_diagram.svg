<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="700">
  <style>.node{fill:#fff;stroke:#222} .title{font-weight:bold}</style>
  <!-- User Browser -->
  <rect x="40" y="40" width="300" height="120" class="node"/>
  <text x="60" y="66" class="title">User Browser</text>
  <text x="60" y="90">- React App (Vite)</text>

  <!-- Web Server Host -->
  <rect x="420" y="40" width="300" height="160" class="node"/>
  <text x="440" y="66" class="title">Web Server</text>
  <text x="440" y="90">- Nginx / Static Files</text>
  <text x="440" y="110">- Reverse Proxy to FastAPI</text>

  <!-- API Server -->
  <rect x="420" y="240" width="300" height="160" class="node"/>
  <text x="440" y="266" class="title">API Server</text>
  <text x="440" y="290">- FastAPI App</text>
  <text x="440" y="310">- Feature Extractor & Predictor</text>

  <!-- ML Model Store -->
  <rect x="780" y="240" width="260" height="120" class="node"/>
  <text x="800" y="266" class="title">Model Store</text>
  <text x="800" y="290">- rf_model.joblib</text>
  <text x="800" y="310">- xgb_model.joblib</text>

  <!-- Database -->
  <rect x="780" y="420" width="260" height="120" class="node"/>
  <text x="800" y="446" class="title">Database</text>
  <text x="800" y="470">- PostgreSQL / Neon</text>

  <!-- Connections -->
  <line x1="340" y1="100" x2="420" y2="100" stroke="#333" marker-end="url(#arrow)"/>
  <line x1="580" y1="200" x2="580" y2="240" stroke="#333" marker-end="url(#arrow)"/>
  <line x1="720" y1="300" x2="780" y2="300" stroke="#333" marker-end="url(#arrow)"/>
  <line x1="720" y1="360" x2="780" y2="360" stroke="#333" marker-end="url(#arrow)"/>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#333"/>
    </marker>
  </defs>

  <text x="40" y="600">Deployment diagram showing user browser, web server, API server, model store, and database nodes.</text>
</svg>