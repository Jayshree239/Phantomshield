<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="700">
  <style>.component{fill:#fff;stroke:#222} .title{font-weight:bold}</style>
  <!-- Frontend component -->
  <rect x="40" y="40" width="340" height="220" class="component"/>
  <text x="60" y="66" class="title">Frontend (React)</text>
  <text x="60" y="90">- ScanInput</text>
  <text x="60" y="110">- ScanResult</text>
  <text x="60" y="130">- Dashboard</text>
  <text x="60" y="150">- Education</text>

  <!-- Backend component -->
  <rect x="420" y="40" width="420" height="320" class="component"/>
  <text x="440" y="66" class="title">Backend (FastAPI)</text>
  <text x="440" y="90">- /api/scan</text>
  <text x="440" y="110">- feature_extractor</text>
  <text x="440" y="130">- predictor (RF + XGB)</text>
  <text x="440" y="150">- explainer_service</text>
  <text x="440" y="170">- education_service</text>
  <text x="440" y="190">- supabase_service / persistence</text>

  <!-- ML component -->
  <rect x="420" y="380" width="420" height="220" class="component"/>
  <text x="440" y="406" class="title">ML Artifacts</text>
  <text x="440" y="430">- rf_model.joblib</text>
  <text x="440" y="450">- xgb_model.joblib</text>
  <text x="440" y="470">- scaler.joblib</text>

  <!-- Database -->
  <rect x="880" y="420" width="200" height="180" class="component"/>
  <text x="900" y="444" class="title">Database</text>
  <text x="900" y="466">- scans table</text>
  <text x="900" y="486">- users table</text>

  <!-- Arrows -->
  <line x1="380" y1="160" x2="420" y2="160" stroke="#333" marker-end="url(#arrow)"/>
  <line x1="840" y1="160" x2="880" y2="160" stroke="#333" marker-end="url(#arrow)"/>
  <line x1="700" y1="360" x2="700" y2="380" stroke="#333" marker-end="url(#arrow)"/>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#333"/>
    </marker>
  </defs>

  <text x="40" y="560">Component diagram showing major modules and data flow between frontend, backend, ML artifacts, and database.</text>
</svg>