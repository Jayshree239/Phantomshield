<svg xmlns="http://www.w3.org/2000/svg" width="900" height="600">
  <style> .actor{font:14px sans-serif;} .usecase{font:13px sans-serif;fill:#fff;} .box{fill:#f4f6f8;stroke:#bbb;stroke-width:1}</style>
  <rect x="20" y="20" width="860" height="560" class="box"/>

  <!-- Actors -->
  <text x="70" y="110" class="actor">User</text>
  <circle cx="70" cy="90" r="18" stroke="#333" fill="#fff"/>

  <text x="70" y="180" class="actor">Admin</text>
  <circle cx="70" cy="160" r="18" stroke="#333" fill="#fff"/>

  <!-- Use cases -->
  <g>
    <ellipse cx="420" cy="80" rx="160" ry="32" fill="#1976d2" opacity="0.12"/>
    <text x="420" y="86" text-anchor="middle" class="usecase">Submit URL / Email / SMS for Scan</text>

    <ellipse cx="420" cy="160" rx="120" ry="28" fill="#1976d2" opacity="0.12"/>
    <text x="420" y="166" text-anchor="middle" class="usecase">View Scan Result & Explanation</text>

    <ellipse cx="420" cy="240" rx="110" ry="28" fill="#1976d2" opacity="0.12"/>
    <text x="420" y="246" text-anchor="middle" class="usecase">Receive Education Tips</text>

    <ellipse cx="420" cy="320" rx="130" ry="28" fill="#1976d2" opacity="0.12"/>
    <text x="420" y="326" text-anchor="middle" class="usecase">View Dashboard / Scan History</text>

    <ellipse cx="420" cy="400" rx="120" ry="28" fill="#1976d2" opacity="0.12"/>
    <text x="420" y="406" text-anchor="middle" class="usecase">Manage Models & System (Admin)</text>
  </g>

  <!-- Associations -->
  <line x1="88" y1="90" x2="260" y2="90" stroke="#333"/>
  <line x1="88" y1="160" x2="260" y2="160" stroke="#333"/>
  <line x1="260" y1="90" x2="260" y2="326" stroke="#333" stroke-dasharray="4"/>

  <line x1="260" y1="90" x2="260" y2="90" stroke="none"/>

  <line x1="260" y1="90" x2="350" y2="90" stroke="#333"/>
  <line x1="260" y1="160" x2="350" y2="160" stroke="#333"/>
  <line x1="260" y1="160" x2="350" y2="240" stroke="#333"/>
  <line x1="260" y1="160" x2="350" y2="320" stroke="#333"/>

  <!-- Legend -->
  <text x="580" y="520" font-size="12">Use cases derived from system capabilities: scan, explain, educate, dashboard, admin.</text>
</svg>